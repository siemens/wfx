name = "app"
version = "0.1.0"
target = "javascript"

description = "A basic UI for wfx"
licences = ["Apache-2.0"]
repository = { type = "github", user = "siemens", repo = "wfx" }
links = [{ title = "Website", href = "https://github.com/siemens/wfx" }]
#
# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

[tools.lustre.bin]
# uncomment to use system binaries
# bun = "system"
# tailwindcss = "system"

[dependencies]
gleam_stdlib = ">= 0.70.0 and < 2.0.0"
gleam_time = ">= 1.7.0 and < 2.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
lustre = ">= 5.6.0 and < 6.0.0"
rsvp = ">= 1.2.0 and < 2.0.0"
modem = ">= 2.1.2 and < 3.0.0"
plinth = ">= 0.9.3 and < 1.0.0"

[dev-dependencies]
gleeunit = "== 1.9.0"
lustre_dev_tools = "== 2.3.5"
simplifile = "== 2.4.0"
birdie = "== 1.5.4"
