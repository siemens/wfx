apiVersion: v1
kind: ServiceAccount
metadata:
  name: wfx-service-account
  namespace: default
  annotations:
    # This annotation links the ServiceAccount to the IAM role
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/wfx-rds-iam-role
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wfx-config
  namespace: default
data:
  RDS_ENDPOINT: "mydb.abc123xyz.us-east-1.rds.amazonaws.com"
  DB_NAME: "wfx"
  DB_USER: "myiamuser"
  DB_PORT: "5432"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wfx
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wfx
  template:
    metadata:
      labels:
        app: wfx
    spec:
      serviceAccountName: wfx-service-account
      containers:
      - name: wfx
        image: wfx:latest
        env:
        # Enable IAM authentication
        - name: WFX_POSTGRES_IAM_AUTH
          value: "true"
        
        # AWS Region
        - name: AWS_REGION
          value: "us-east-1"
        
        # PostgreSQL connection settings
        - name: PGHOST
          valueFrom:
            configMapKeyRef:
              name: wfx-config
              key: RDS_ENDPOINT
        - name: PGPORT
          valueFrom:
            configMapKeyRef:
              name: wfx-config
              key: DB_PORT
        - name: PGUSER
          valueFrom:
            configMapKeyRef:
              name: wfx-config
              key: DB_USER
        - name: PGDATABASE
          valueFrom:
            configMapKeyRef:
              name: wfx-config
              key: DB_NAME
        - name: PGSSLMODE
          value: "require"
        
        # wfx settings
        - name: WFX_LOG_LEVEL
          value: "debug"
        
        command:
        - /usr/bin/wfx
        args:
        - --storage
        - postgres
        
        ports:
        - name: northbound
          containerPort: 8081
          protocol: TCP
        - name: southbound
          containerPort: 8080
          protocol: TCP
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: wfx-northbound
  namespace: default
spec:
  selector:
    app: wfx
  ports:
  - name: http
    port: 8081
    targetPort: 8081
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: wfx-southbound
  namespace: default
spec:
  selector:
    app: wfx
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP
